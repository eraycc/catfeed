# ============================================================
# 八、常见问题
# ============================================================
#
# Q: 如何调试配置?
# A: 投喂失败时，服务端日志会记录失败阶段的完整请求和响应。
#
# Q: set 里怎么引用响应字段?
# A: 必须用 {{...}} 包裹，如 feed_id: "{{body.feed_id}}"。
#    裸字符串 "body.feed_id" 会被当字面量，不会自动取值。
#    保存时引擎会检测疑似遗漏 {{}} 的写法并给出警告。
#
# Q: critical 标记有什么用?
# A: 标记"这一步是真正的投喂动作"。如果所有 critical 阶段都被 when 跳过，
#    引擎会返回失败，而不是误报成功。
#
# Q: 超时时间怎么算?
# A: 每个阶段独立超时(默认 10s)，同时受 max_duration 全局时间预算约束。
#    引擎会在每次请求前检查剩余预算，自动压缩单次超时。
#
# Q: 旧配置还能用吗?
# A: 完全兼容。旧的平铺 validate 数组、extract 简写、无 critical/when/set 的配置
#    都能正常运行，行为与 v1 一致。
