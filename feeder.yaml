# ============================================================
# CatFeed 喂食器 YAML 规则配置 (v2)
# ============================================================
# 阶段执行顺序: 请求 → extract → validate → set(写result)
# 兼容 Vercel Serverless: 全流程受 max_duration 时间预算约束
# 向后兼容: 旧版字段(平铺 validate 数组、extract 简写)仍可用
# ============================================================


# ============================================================
# 一、完整模板
# ============================================================

name: "智能投喂器"                     # 可选，描述性名称
description: "覆盖多场景的智能喂食规则"  # 可选

# ── 全局时间预算 (毫秒) ──
# 所有 stage 的请求+重试+间隔总和超过此值时，引擎提前中止。
# Hobby 计划函数上限 10s，留 1s 余量。Pro 可调大。
max_duration: 9000

# ── 环境变量 ──
env:
  BASE_URL: "https://feeder-api.example.com/v1"
  TOKEN: "your-api-token"
  DEVICE: "feeder-001"

# ── 全局默认值 (每个 stage 未显式声明时继承) ──
defaults:
  timeout: 10000            # 单个请求默认超时 (ms)，stage 可覆盖
  headers:                  # 公共请求头，stage headers 会与之合并(stage 优先)
    Authorization: "Bearer {{TOKEN}}"
    Accept: "application/json"
  retry:                    # 默认重试策略，stage 可覆盖
    count: 0                # 重试次数 (0 = 不重试)
    delay: 500              # 重试间隔 (ms)
    on: ["network", "5xx"]  # 触发重试的情形: network / 5xx / 4xx / timeout


# ============================================================
# 二、变量与路径语法
# ============================================================
#
# 引用变量:   {{变量名}}   或带路径 {{body.data.status}}
#
# 系统变量:   {{amount}}            投喂量，默认 "1"
# env 变量:   {{TOKEN}} 或 {{env.TOKEN}}
# 成功信息:   {{result}} 或 {{result.message}}   贯穿所有 stage，可读可写
#
# 每个 stage 请求后产生以下命名空间，供 extract / validate / when / set 使用:
#   status            HTTP 状态码 (数字)
#   headers           响应头 (键名全部小写)
#   body              响应体 (JSON 对象 或 纯文本字符串)
#   response          完整响应 { status, headers, body }
#
# 路径访问 (点号与方括号可混用):
#   body.data.status            点号(仅限 字母/数字/下划线 的 key)
#   body["data"]["status"]      方括号键访问
#   body.items[0].name          数组下标
#   headers["content-type"]     含连字符的 key 必须用方括号
#   body.list[2]["device-id"]   混合写法
#
# 类型保留: 当整个字符串恰好是单个 {{path}} 时，注入原始类型(数字/布尔/对象/数组)，
#           而非字符串。例如 amount: "{{amount}}" 在 body 中会保留为数字。
#           若与其它文本拼接(如 "v{{ver}}")则按字符串拼接。


# ============================================================
# 三、stages —— 按顺序执行
# ============================================================

stages:

  # ── 阶段1: 检查设备状态 ──
  - name: "检查设备状态"
    request:
      url: "{{BASE_URL}}/device/{{DEVICE}}/status"
      method: GET
      # headers 继承 defaults，可在此追加/覆盖
    timeout: 8000              # 覆盖默认超时
    retry:
      count: 2
      delay: 1000
      on: ["network", "5xx", "timeout"]

    # extract 先于 validate 执行；支持响应体、响应头、完整响应
    extract:
      dev_status:
        from: "body.data.status"
        required: true         # 取不到则该阶段判失败 (等价于 on_missing: "fail")
      firmware:
        from: "body.data.firmware"
        default: "unknown"     # 取不到用默认值 (等价于 on_missing: "default")
      trace_id:
        from: 'headers["x-trace-id"]'  # 从响应头提取
        default: ""
      http_code:
        from: "status"         # HTTP 状态码

    # validate 可访问 extract 出来的变量；支持 and/or/not 任意嵌套
    validate:
      and:
        - field: "http_code"
          equals: 200
        - field: "dev_status"
          equals: "online"
          error: "设备离线，暂时无法投喂"

    # set: 写入/覆写成功信息保留变量 result
    # 注意: set 的值中如需引用变量必须用 {{...}}，裸字符串按字面量处理
    set:
      result:
        message: "设备在线 (固件 {{firmware}})"
        device: "{{DEVICE}}"

  # ── 阶段2: 检查余量与冷却 ──
  - name: "检查余量"
    when:                      # 条件成立才执行此阶段，否则跳过(不算失败)
      not:
        field: "dev_status"
        equals: "maintenance"
    request:
      url: "{{BASE_URL}}/device/{{DEVICE}}/capacity"
      method: GET
    extract:
      remaining:
        from: "body.remaining"
        default: 0
      cooldown:
        from: "body.seconds_since_last"
        default: 9999
    validate:
      and:
        - field: "remaining"
          gte: 1
          error: "投喂器余量不足，请联系管理员补充"
        - or:                  # 余量充足 且 (冷却已过 或 是VIP)
            - field: "cooldown"
              gte: 300
            - field: "body.is_vip"
              equals: true
          error: "距离上次投喂太短，请 5 分钟后再试"
    set:
      result:
        message: "{{result.message}} | 余量 {{remaining}}"
        remaining: "{{remaining}}"

  # ── 阶段3: 执行投喂 (关键阶段) ──
  - name: "执行投喂"
    critical: true             # 标记为关键阶段: 存在 critical 但全部被跳过 → 整体失败
    request:
      url: "{{BASE_URL}}/device/{{DEVICE}}/feed"
      method: POST
      body_type: json          # json(默认) / form / raw
      body:
        device_id: "{{DEVICE}}"
        amount: "{{amount}}"   # 类型保留为数字
        trace: "{{trace_id}}"
    validate:
      and:
        - field: "status"
          in: [200, 201]
        - field: "body.success"
          equals: true
          error: "投喂指令发送失败，请稍后重试"
    set:
      result:
        message: "{{result.message}} | 投喂成功 ✓"
        feed_id: "{{body.feed_id}}"


# ============================================================
# 四、extract 的 on_missing 策略
# ============================================================
#
# 当 extract 某字段取不到值时，on_missing 决定如何处理:
#
#   on_missing: "fail"      硬失败，中止整个流程 (required: true 的等价写法)
#   on_missing: "default"   用 default 字段的值兜底 (默认行为)
#   on_missing: "skip"      跳过本阶段剩余步骤，继续下一阶段 (预留)
#   on_missing: "stop"      提前正常结束整个流程，不报错 (预留)
#
# 示例:
#   extract:
#     token:
#       from: "body.access_token"
#       on_missing: "fail"          # token 必须存在
#     optional_info:
#       from: "body.extra.info"
#       on_missing: "default"
#       default: "N/A"              # 取不到用 "N/A"


# ============================================================
# 五、验证操作符参考
# ============================================================
#
# 每个 field 规则可组合多个，组合内为 AND:
#
#   equals / not_equals          等于 / 不等于
#   gt / gte / lt / lte          数值比较
#   in: [..] / not_in: [..]      在/不在列表中
#   contains: "str"              字符串包含 (或数组包含)
#   starts_with / ends_with      字符串前缀 / 后缀
#   regex: "^\\d+$"              正则匹配
#   exists: true|false           字段存在性
#
# 布尔组合 (可任意嵌套):
#   and: [ 规则或子组合, ... ]    全部满足
#   or:  [ 规则或子组合, ... ]    任一满足
#   not: 单个规则或子组合         取反
#   (兼容别名: all=and, any=or)
#
# 如果不写 validate，该阶段执行后直接进入下一阶段


# ============================================================
# 六、执行流程说明
# ============================================================
#
# 对每个 stage 按顺序执行:
#
#   0. when 检查: 条件不满足则跳过该阶段(标记 skipped，不算失败)
#
#   1. 变量替换: 将 URL、Headers、Body 中的 {{var}} 替换为实际值
#
#   2. 发起请求: 使用替换后的参数发送 HTTP 请求 (带超时和重试)
#
#   3. 提取变量 (extract，先于 validate):
#      - 从响应体/响应头/状态码中按路径提取字段
#      - 存入变量池，本阶段和后续阶段均可通过 {{变量名}} 引用
#      - on_missing 决定取不到时的行为
#
#   4. 验证响应 (validate):
#      - 支持 and/or/not 布尔组合
#      - 任一规则失败 → 记录日志 → 停止后续阶段 → 返回错误
#
#   5. 写入成功信息 (set):
#      - 更新 result 保留变量，后续阶段可读可写
#
#   6. critical 追踪:
#      - 若阶段标记 critical: true 且执行成功 → 记录 executedCritical
#      - 全部阶段完成后，若存在 critical 但全部被跳过 → 返回失败
#
# 全部阶段完成 → 返回成功 + result 成功信息


# ============================================================
# 七、示例: 简单投喂 (单阶段，向后兼容旧写法)
# ============================================================

